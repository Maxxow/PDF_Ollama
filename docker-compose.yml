version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cluster_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=document_system

  # Optional: Mongo Express para ver tu base de datos desde una interfaz web
  mongo-express:
    image: mongo-express
    container_name: cluster_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false # Desactiva el login de admin para acceso rápido local
    depends_on:
      - mongodb

volumes:
  mongo_data:
